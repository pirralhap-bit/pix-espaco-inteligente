<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pague com PIX</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0b0b0f;
    --card: #16161d;
    --fg: #f5f5f7;
    --muted: #8a8a99;
    --accent: #32d583;
    --accent-fg: #06210f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100dvh;
  }
  main {
    max-width: 420px; margin: 0 auto;
    padding: 24px 20px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  h1 { font-size: 22px; margin: 0; font-weight: 600; }
  .recebedor { color: var(--muted); margin: -10px 0 0; font-size: 14px; }
  .qr-wrap {
    background: #fff; padding: 14px; border-radius: 16px;
    display: flex; justify-content: center; align-items: center;
  }
  #qr canvas { display: block; }
  button {
    width: 100%; max-width: 320px;
    padding: 16px 20px; border: 0; border-radius: 14px;
    background: var(--accent); color: var(--accent-fg);
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: transform .08s ease, opacity .2s ease;
  }
  button:active { transform: scale(.98); }
  button.ok { background: #2a2a35; color: var(--fg); }
  details {
    width: 100%; max-width: 320px;
    background: var(--card); border-radius: 12px; padding: 12px 14px;
    font-size: 13px;
  }
  summary { color: var(--muted); cursor: pointer; user-select: none; }
  code {
    display: block; margin-top: 10px; padding: 10px;
    background: #0b0b0f; border-radius: 8px;
    color: var(--fg); font-size: 11px; word-break: break-all;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .hint { color: var(--muted); font-size: 12px; text-align: center; max-width: 320px; }
</style>
</head>
<body>
<main>
  <h1>Pague com PIX</h1>
  <p class="recebedor">Espa&ccedil;o Inteligente</p>

  <div class="qr-wrap"><div id="qr"></div></div>

  <button id="copiar">Copiar código PIX</button>

  <p class="hint">Escaneie o QR no app do seu banco ou toque em "Copiar" e cole em PIX → Copia e Cola.</p>

  <details>
    <summary>Ver código completo</summary>
    <code id="payload"></code>
  </details>
</main>

<script>
  const payload = "00020101021126360014br.gov.bcb.pix0114319849200001155204000053039865802BR5918ESPACO INTELIGENTE6009SAO PAULO62070503***63043464";

  QRCode.toCanvas(document.getElementById("qr"), payload, { width: 260, margin: 1 });
  document.getElementById("payload").textContent = payload;

  const btn = document.getElementById("copiar");
  btn.addEventListener("click", async () => {
    try {
      await navigator.clipboard.writeText(payload);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = payload; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy"); ta.remove();
    }
    btn.textContent = "Copiado!";
    btn.classList.add("ok");
    setTimeout(() => {
      btn.textContent = "Copiar código PIX";
      btn.classList.remove("ok");
    }, 1500);
  });
</script>
</body>
</html>
