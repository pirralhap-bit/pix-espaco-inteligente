<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pague com PIX</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  :root {
    --bg: #0b0b0f;
    --card: #16161d;
    --fg: #f5f5f7;
    --muted: #8a8a99;
    --accent: #32d583;
    --accent-fg: #06210f;
    --warn: #f0b429;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100dvh;
  }
  main {
    max-width: 420px; margin: 0 auto;
    padding: 24px 20px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  h1 { font-size: 22px; margin: 0; font-weight: 600; }
  .recebedor { color: var(--muted); margin: -10px 0 0; font-size: 14px; }
  .qr-wrap {
    background: #fff; padding: 14px; border-radius: 16px;
    display: flex; justify-content: center; align-items: center;
  }
  #qr canvas { display: block; }
  button {
    width: 100%; max-width: 320px;
    padding: 16px 20px; border: 0; border-radius: 14px;
    background: var(--accent); color: var(--accent-fg);
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: transform .08s ease, background .2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(.98); }
  button.ok { background: #2a2a35; color: var(--fg); }
  button.err { background: var(--warn); color: #2b1d00; }
  .payload-box {
    width: 100%; max-width: 320px;
    background: var(--card); border-radius: 12px; padding: 12px;
  }
  .payload-box label {
    display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px;
  }
  #payload-input {
    width: 100%; box-sizing: border-box;
    background: #0b0b0f; color: var(--fg);
    border: 1px solid #2a2a35; border-radius: 8px;
    padding: 10px; font-size: 11px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    word-break: break-all; resize: none; min-height: 90px;
    -webkit-user-select: all; user-select: all;
  }
  .hint { color: var(--muted); font-size: 12px; text-align: center; max-width: 320px; line-height: 1.4; }
</style>
</head>
<body>
<main>
  <h1>Pague com PIX</h1>
  <p class="recebedor">Espa&ccedil;o Inteligente</p>

  <div class="qr-wrap"><div id="qr"></div></div>

  <button id="copiar">Copiar c&oacute;digo PIX</button>

  <p class="hint">Escaneie o QR no app do seu banco ou copie o c&oacute;digo abaixo e cole em PIX &rarr; Copia e Cola.</p>

  <div class="payload-box">
    <label for="payload-input">C&oacute;digo copia-e-cola</label>
    <textarea id="payload-input" readonly rows="4" onclick="this.select()"></textarea>
  </div>
</main>

<script>
  const payload = "00020101021126360014br.gov.bcb.pix0114319849200001155204000053039865802BR5918ESPACO INTELIGENTE6009SAO PAULO62070503***63043464";

  QRCode.toCanvas(document.getElementById("qr"), payload, { width: 260, margin: 1 });

  const input = document.getElementById("payload-input");
  input.value = payload;

  const btn = document.getElementById("copiar");
  const label = "Copiar código PIX";

  function flash(text, cls) {
    btn.textContent = text;
    btn.classList.remove("ok", "err");
    if (cls) btn.classList.add(cls);
    setTimeout(() => {
      btn.textContent = label;
      btn.classList.remove("ok", "err");
    }, 2200);
  }

  function fallbackCopy() {
    input.focus();
    input.setSelectionRange(0, payload.length);
    try {
      return document.execCommand("copy");
    } catch (e) {
      console.warn("execCommand copy failed", e);
      return false;
    }
  }

  btn.addEventListener("click", () => {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(payload).then(
        () => flash("Copiado!", "ok"),
        (err) => {
          console.warn("clipboard.writeText failed", err);
          if (fallbackCopy()) flash("Copiado!", "ok");
          else flash("Selecione o código abaixo", "err");
        }
      );
    } else {
      if (fallbackCopy()) flash("Copiado!", "ok");
      else flash("Selecione o código abaixo", "err");
    }
  });
</script>
</body>
</html>
